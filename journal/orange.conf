server {
    listen 8080;

    server_name orange;

    # Document root
    root /var/www/orange/webroot;

    # Default index files
    index index.html;

    # Logging
    access_log /var/log/nginx/orange-access.log;
    error_log /var/log/nginx/orange-error.log;

    # Handle requests
    location / {
        # Try serving the file, then directory, then return 404
        try_files $uri $uri/ =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
